5": {"date_str": "2026年04月15日", "weekday": "星期三", "items": [{"rank": 1, "score": 9.2, "title": "Abridge 整合 UpToDate、NEJM 與 JAMA 擴展 AI 臨床決策支援能力", "summary": "AI 醫療文件公司 Abridge 宣布與 Wolters Kluwer 旗下 UpToDate 建立合作夥伴關係，並同步整合《新英格蘭醫學期刊》（NEJM）及《美國醫學會期刊》（JAMA）的內容資源，大幅擴充其臨床決策支援功能。Abridge 原以 AI 輔助病歷記錄聞名，此次整合將使系統能在診療流程中即時提供循證醫學文獻建議，將醫療記錄輔助工具升級為具備證據基礎的臨床決策支援平台。UpToDate 為全球醫師最廣泛使用的臨床參考資料庫之一，與 NEJM、JAMA 等頂尖期刊的整合，代表 AI 醫療工具正從行政效率導向轉型為深度介入臨床決策的方向，對醫師工作流程與醫療品質具有重要影響意義。", "tags": ["臨床決策支援", "AI醫療文件", "循證醫學", "醫師工作流程"], "author": "Fierce Healthcare（2026-04-15）", "source_url": "https://www.fiercehealthcare.com/ai-and-machine-learning/abridge-expands-clinical-decision-support-capabilities-uptodate-partnership"}, {"rank": 2, "score": 8.8, "title": "AI 放射科「最後一哩路」問題：偵測能力提升但後續追蹤機制失靈", "summary": "MedCity News 刊載深度分析指出，AI 放射影像判讀技術在病灶偵測精準度上已有顯著進步，然而臨床實務中卻面臨「最後一哩路問題」——即 AI 成功識別異常後，後續的臨床跟進、通知流程與患者管理環節仍存在嚴重斷鏈現象。文章探討 AI 偵測結果未能有效轉化為臨床行動的系統性障礙，包括工作流程整合不足、責任歸屬不明確、以及缺乏標準化的後續追蹤機制等問題。此議題凸顯出醫療 AI 導入不能僅聚焦於演算法性能，更需重視系統整合與臨床流程再造，方能真正提升患者照護品質與安全。", "tags": ["AI放射診斷", "臨床工作流程", "患者安全", "醫療系統整合"], "author": "MedCity News（2026-04-15）", "source_url": "https://medcitynews.com/2026/04/the-last-mile-problem-in-ai-radiology-detection-improves-follow-through-breaks/"}, {"rank": 3, "score": 8.5, "title": "STAT AI Prognosis：15 美元 AI 診斷測試、Project Glasswing 及猶他州 AI 醫療試驗爭議", "summary": "STAT News 本期 AI Prognosis 電子報聚焦三項重要議題：其一為僅需 15 美元的低成本 AI 診斷測試，探討其普及化潛力與精準度疑慮；其二為 Project Glasswing 計畫及其對整體醫療照護體系的潛在影響；其三則報導 Doctronic 公司在猶他州推行 AI 醫療試驗過程中，因事前未充分知會猶他州醫療委員會而引發監管爭議的事件始末。此系列報導反映出醫療 AI 商業化進程加速的背景下，監管框架與臨床試驗倫理規範面臨的現實挑戰，以及低成本 AI 工具在醫療平等化方面的潛力與風險並存的複雜局面。", "tags": ["醫療AI監管", "AI診斷工具", "醫療倫理", "臨床試驗"], "author": "STAT News（2026-04-15）", "source_url": "https://www.statnews.com/2026/04/15/ai-test-project-glasswing-doctronic-pilot-ai-prognosis/?utm_campaign=rss"}, {"rank": 4, "score": 8.0, "title": "非處方數位療法（ODTx）：LLM 與穿戴裝置整合的下一步臨床應用", "summary": "MedCity News 刊載分析文章，探討非處方數位療法（Over-the-Counter Digital Therapeutics, ODTx）如何成為大型語言模型（LLM , "author": "Healthcare IT News（2026-04-15）", "source_url": "https://www.healthcareitnews.com/news/cms-announces-150-participants-upcoming-access-model-launch"}]}};

function renderTagline(tags){
  const arr = (tags || []).filter(Boolean);
  if (!arr.length) return '';
  return arr.map(t => esc(t)).join(' | ');
}

function renderCard(item, rank) {
  const tags = item.tags || [];

    : '';

  return `
  <article class="article-card" data-tags="${tags.map(esc).join('|')}" style="animation-delay:${(rank*0.05).toFixed(2)}s">
    <div class="card-top">
      <div class="tagline">${tagline}</div>
    </div>
    <div class="card-img">
      <img src="${DEFAULT_COVER_SVG}" alt="cover" loading="lazy" />
    </div>
    <div class="card-body">
      <h3 class="card-title">${titleHtml}</h3>
      <p class="card-summary">${esc(item.summary||'')}</p>
      <div class="card-meta">
        <span class="meta-date">${dateText ? esc(dateText) : ''}</span>
        <span>${srcBtn}</span>
      </div>
    </div>
  </article>`;
}

function switchDay(dateIso) {
  const day = ALL_DAYS[dateIso];
  if (!day) return;
  const items = day.items || [];

  document.getElementById('page-title').textContent =
    `醫療AI每日情報｜${day.date_str}（${day.weekday}）`;
  document.getElementById('count-badge').textContent =
    `今日精選 ${items.length} 則`;
  document.getElementById('list-count').textContent =
    `共 ${items.length} 筆`;

  const hd = document.querySelector('.header-date');
  if (hd) hd.textContent = `📅 ${day.date_str}（${day.weekday}）`;

  document.getElementById('article-list').innerHTML =
    items.map((item, i) => renderCard(item, i+1)).join('');

  const allTags = [];
  items.forEach(item => (item.tags||[]).forEach(t => {
    if (!allTags.includes(t)) allTags.push(t);
  }));

  document.getElementById('sidebar-links').innerHTML =
    `<a class="sidebar-link active" href="#" onclick="filterByTag(this,'all');return false;">
       今日精選 <span class="count">${items.length}</span>
     </a>` +
    allTags.map(t =>
      `<a class="sidebar-link" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  document.getElementById('tag-cloud').innerHTML =
    allTags.map(t =>
      `<a class="tag-chip" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  document.querySelectorAll('.date-btn[data-date-iso]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dateIso === dateIso);
    const weekdayEl = btn.querySelector('.date-btn-weekday');
    if (weekdayEl) {
      if (btn.dataset.dateIso === TODAY_ISO) weekdayEl.textContent = '今天';
    }
  });

  const footer = document.querySelector('.footer');
  if (footer) footer.innerHTML =
    `<strong>🧠 奇美醫療AI每日情報</strong>｜奇美醫療體系 · AI Everywhere 計畫<br>
     本簡報由奇美 AI Everywhere 情報代理人自動生成 · ${day.date_str}`;
}

function filterByTag(el, tag) {
  const cards = document.querySelectorAll('.article-card');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

  let visible = 0;
  cards.forEach(card => {
    const match = tag === 'all' ||
      (card.getAttribute('data-tags')||'').split('|').includes(tag);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  document.getElementById('list-count').textContent  = `共 ${visible} 筆`;
  document.getElementById('count-badge').textContent = `今日精選 ${visible} 則`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

switchDay(TODAY_ISO);
</script>
</body>
</html>
