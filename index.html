<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇美 AI Everywhere Brief｜2026年04月16日</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0a1628;
    --blue:    #1a4a8a;
    --accent:  #2b7fe8;
    --light-blue: #e8f2fd;
    --teal:    #0e9f8e;
    --red:     #d63c2f;
    --orange:  #e07520;
    --green:   #1e9e5a;
    --bg:      #f2f5f9;
    --surface: #ffffff;
    --border:  #dce4ef;
    --text:    #1a2333;
    --text2:   #445066;
    --muted:   #7a8899;
    --serif:   'Noto Serif TC', serif;
    --sans:    'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 17px;
    line-height: 1.8;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    background-image: linear-gradient(135deg, #0a1628 0%, #162d58 60%, #1a4a8a 100%);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 22px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .logo-text p { font-size: 0.8rem; color: #8aafd4; margin-top: 1px; }
  .header-date {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.88rem;
    color: #a8c8ea;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
  }
  .breadcrumb-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb .sep { color: #c0c8d4; }
  .breadcrumb .current { color: var(--accent); font-weight: 600; }

  /* ── LAYOUT ── */
  .layout {
    max-width: 1360px;
    margin: 0 auto;
    padding: 40px 32px 100px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 82px; }
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.06);
  }
  .sidebar-head {
    background: var(--navy);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 12px 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    font-size: 0.92rem;
    color: var(--text2);
    text-decoration: none;
    border-bottom: 1px solid #f0f4f8;
    transition: all 0.15s;
  }
  .sidebar-link:last-child { border-bottom: none; }
  .sidebar-link:hover { background: var(--light-blue); color: var(--accent); }
  .sidebar-link.active { color: var(--accent); font-weight: 700; background: #eef5fd; }
  .sidebar-link .count {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .sidebar-link.active .count { background: var(--accent); color: #fff; }
  .tag-cloud { padding: 16px 16px; display: flex; flex-wrap: wrap; gap: 7px; }
  .tag-chip {
    font-size: 0.84rem;
    color: var(--accent);
    background: var(--light-blue);
    border-radius: 20px;
    padding: 3px 10px;
    text-decoration: none;
    transition: all 0.15s;
    font-weight: 500;
  }
  .tag-chip:hover { background: var(--accent); color: #fff; }

  /* ── MAIN ── */
  .main { min-width: 0; }
  .page-title-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 36px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title-bar h2 {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
  }
  .count-badge {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.88rem;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .list-meta {
    font-size: 0.82rem;
    color: var(--muted);
    padding: 6px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid var(--border);
  }
  .list-meta-label {
    background: var(--accent);
    color: #fff;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 4px;
  }

  /* ── ARTICLE CARD ── */
  .article-list { display: flex; flex-direction: column; }
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 34px 40px 30px;
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 0 24px;
    transition: background 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.4s ease both;
  }
  .article-card:first-child { border-top: 1px solid var(--border); border-radius: 12px 12px 0 0; }
  .article-card:last-child { border-radius: 0 0 12px 12px; }
  .article-card:hover { background: #fafcff; box-shadow: inset 3px 0 0 var(--accent); }

  
  .article-card:nth-child(1) { animation-delay: 0.05s; }
  
  .article-card:nth-child(2) { animation-delay: 0.1s; }
  
  .article-card:nth-child(3) { animation-delay: 0.15s; }
  
  .article-card:nth-child(4) { animation-delay: 0.2s; }
  
  .article-card:nth-child(5) { animation-delay: 0.25s; }
  
  .article-card:nth-child(6) { animation-delay: 0.3s; }
  
  .article-card:nth-child(7) { animation-delay: 0.35s; }
  

  .card-num { padding-top: 4px; text-align: center; }
  .num-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .num-top1 { background: #fff0ee; border-color: var(--red); color: var(--red); }
  .num-top2 { background: #fff4ec; border-color: var(--orange); color: var(--orange); }
  .num-top3 { background: #edfbf4; border-color: var(--green); color: var(--green); }

  .card-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
  .badge { font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 3px; letter-spacing: 0.04em; }
  .b-top1 { background: var(--red); color: #fff; }
  .b-top2 { background: var(--orange); color: #fff; }
  .b-top3 { background: var(--green); color: #fff; }
  .b-focus { background: var(--blue); color: #fff; }
  .b-cat { background: var(--light-blue); color: var(--blue); font-weight: 600; border: 1px solid #c5dbf5; }

  .card-title {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .card-title a { color: inherit; text-decoration: none; transition: color 0.15s; }
  .article-card:hover .card-title a { color: var(--accent); }

  .card-meta {
    font-size: 0.86rem;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .card-summary { font-size: 0.98rem; color: var(--text2); line-height: 1.9; margin-bottom: 14px; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #f0f4f8;
  }
  .hashtags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hashtag { font-size: 0.84rem; color: var(--accent); text-decoration: none; }
  .hashtag:hover { color: var(--navy); text-decoration: underline; }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--navy);
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.84rem;
    font-weight: 600;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .source-btn:hover { background: var(--accent); }

  /* ── FOOTER ── */
  .footer {
    background: var(--navy);
    color: #6a8aaa;
    text-align: center;
    padding: 28px 20px;
    font-size: 0.82rem;
    margin-top: 40px;
    line-height: 2;
  }
  .footer strong { color: #a0bcd8; }

  /* ── DATE NAV ── */
  .date-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    box-shadow: 0 2px 6px rgba(10,22,40,0.04);
  }
  .date-nav-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .date-nav-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-right: 6px;
    white-space: nowrap;
  }
  .date-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-width: 68px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    line-height: 1.3;
  }
  .date-btn:hover:not(.disabled):not(.active) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--light-blue);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(43,127,232,0.15);
  }
  .date-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(43,127,232,0.3);
    transform: translateY(-1px);
  }
  .date-btn.disabled {
    opacity: 0.38;
    cursor: not-allowed;
    background: #f6f8fb;
    border-color: #e4e9f0;
    color: var(--muted);
  }
  .date-btn-weekday {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .date-btn-md {
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; padding: 20px 16px 60px; }
    .sidebar { display: none; }
    .header-inner { padding: 14px 20px; }
    .header-date { display: none; }
    .article-card { padding: 18px 18px 16px; grid-template-columns: 32px 1fr; gap: 0 12px; }
    .card-title { font-size: 1.05rem; }
    .page-title-bar { padding: 16px 20px; }
    .date-nav-inner { padding: 0 16px; gap: 7px; }
    .date-btn { min-width: 56px; padding: 7px 8px; }
    .date-btn-weekday { font-size: 0.7rem; }
    .date-btn-md { font-size: 0.82rem; }
    .date-nav-label { display: none; }
  }
</style>
</head>

// ── 產生單張文章卡片 HTML ────────────────────────────────────────
function renderCard(item, rank) {
  const badges = {
    1: ['b-top1','🥇 Top 1'],
    2: ['b-top2','🥈 Top 2'],
    3: ['b-top3','🥉 Top 3'],
  };
  const numClasses = { 1:'num-top1', 2:'num-top2', 3:'num-top3' };
  const [badgeCls, badgeTxt] = badges[rank] || ['b-focus','焦點'];
  const numCls  = numClasses[rank] || '';
  const tags    = item.tags || [];
  const catBadges = tags.slice(0,2).map(t=>`<span class="badge b-cat">${esc(t)}</span>`).join('');
  const titleHtml = item.source_url
    ? `<a href="${esc(item.source_url)}" target="_blank">${esc(item.title)}</a>`
    : esc(item.title);
  const hashtags = tags.map((t,i)=>
    `<a class="hashtag" href="#" onclick="filterByTag(this,'${esc(t)}');return false;">#${esc(t)}${i<tags.length-1?'、':''}</a>`
  ).join('');
  const srcBtn = item.source_url
    ? `<a class="source-btn" href="${esc(item.source_url)}" target="_blank">🔗 原始來源</a>` : '';

  return `
  <article class="article-card" data-tags="${tags.map(esc).join('|')}" style="animation-delay:${(rank*0.05).toFixed(2)}s">
    <div class="card-num"><div class="num-circle ${numCls}">${rank}</div></div>
    <div class="card-body">
      <div class="card-badges"><span class="badge ${badgeCls}">${badgeTxt}</span>${catBadges}</div>
      <div class="card-title">${titleHtml}</div>
      <div class="card-meta"><span>📅 ${esc(item.author||'')}</span></div>
      <div class="card-summary">${esc(item.summary||'')}</div>
      <div class="card-footer">
        <div class="hashtags">${hashtags}</div>${srcBtn}
      </div>
    </div>
  </article>`;
}

  const day = ALL_DAYS[dateIso];
  if (!day) return;
  const items = day.items || [];

  // 標題列
  document.getElementById('page-title').textContent =
    `醫療AI每日情報｜${day.date_str}（${day.weekday}）`;
  document.getElementById('count-badge').textContent =
    `今日精選 ${items.length} 則`;
  document.getElementById('list-count').textContent =
    `共 ${items.length} 筆`;

  // Header 日期
  const hd = document.querySelector('.header-date');
  if (hd) hd.textContent = `📅 ${day.date_str}（${day.weekday}）`;

  // 文章列表
  document.getElementById('article-list').innerHTML =
    items.map((item, i) => renderCard(item, i+1)).join('');

  // 收集所有標籤
  const allTags = [];
  items.forEach(item => (item.tags||[]).forEach(t => {
    if (!allTags.includes(t)) allTags.push(t);
  }));

  // 側欄分類
  document.getElementById('sidebar-links').innerHTML =
    `<a class="sidebar-link active" href="#" onclick="filterByTag(this,'all');return false;">
       今日精選 <span class="count">${items.length}</span>
     </a>` +
    allTags.map(t =>
      `<a class="sidebar-link" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 標籤雲
  document.getElementById('tag-cloud').innerHTML =
    allTags.map(t =>
      `<a class="tag-chip" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 日期按鈕 active 狀態
  document.querySelectorAll('.date-btn[data-date-iso]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dateIso === dateIso);
    // 今天的按鈕文字
    const weekdayEl = btn.querySelector('.date-btn-weekday');
    if (weekdayEl) {
      if (btn.dataset.dateIso === TODAY_ISO) weekdayEl.textContent = '今天';
      // else 保持原來的星期文字（Jinja2 渲染時已設定）
    }
  });

  // Footer
  const footer = document.querySelector('.footer');
  if (footer) footer.innerHTML =
    `<strong>🧠 奇美醫療AI每日情報</strong>｜奇美醫療體系 · AI Everywhere 計畫<br>
     本簡報由奇美 AI Everywhere 情報代理人自動生成 · ${day.date_str}`;
}

// ── 標籤篩選 ──────────────────────────────────────────────────
function filterByTag(el, tag) {
  const cards = document.querySelectorAll('.article-card');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

  let visible = 0;
  cards.forEach(card => {
    const match = tag === 'all' ||
      (card.getAttribute('data-tags')||'').split('|').includes(tag);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  document.getElementById('list-count').textContent  = `共 ${visible} 筆`;
  document.getElementById('count-badge').textContent = `今日精選 ${visible} 則`;

  const vis = [...cards].filter(c => c.style.display !== 'none');
  cards.forEach(c => { c.style.borderRadius=''; c.style.borderTop=''; });
  if (vis.length) {
    vis[0].style.cssText += ';border-radius:12px 12px 0 0;border-top:1px solid var(--border)';
    if (vis.length===1) vis[0].style.borderRadius='12px';
    else vis[vis.length-1].style.cssText += ';border-radius:0 0 12px 12px';
  }
}

// ── HTML 跳脫工具 ─────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 頁面初始化 ────────────────────────────────────────────────
switchDay(TODAY_ISO);
</script>
