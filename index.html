<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇美 AI Everywhere Brief｜2026年04月21日</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0a1628;
    --blue:    #1a4a8a;
    --accent:  #2b7fe8;
    --light-blue: #e8f2fd;
    --teal:    #0e9f8e;
    --red:     #d63c2f;
    --orange:  #e07520;
    --green:   #1e9e5a;
    --bg:      #f2f5f9;
    --surface: #ffffff;
    --border:  #dce4ef;
    --text:    #1a2333;
    --text2:   #445066;
    --muted:   #7a8899;
    --serif:   'Noto Serif TC', serif;
    --sans:    'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 17px;
    line-height: 1.8;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    background-image: linear-gradient(135deg, #0a1628 0%, #162d58 60%, #1a4a8a 100%);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 22px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .logo-text p { font-size: 0.8rem; color: #8aafd4; margin-top: 1px; }
  .header-date {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.88rem;
    color: #a8c8ea;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
  }
  .breadcrumb-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb .sep { color: #c0c8d4; }
  .breadcrumb .current { color: var(--accent); font-weight: 600; }

  /* ── LAYOUT ── */
  .layout {
    max-width: 1360px;
    margin: 0 auto;
    padding: 40px 32px 100px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 82px; }
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.06);
  }
  .sidebar-head {
    background: var(--navy);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 12px 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    font-size: 0.92rem;
    color: var(--text2);
    text-decoration: none;
    border-bottom: 1px solid #f0f4f8;
    transition: all 0.15s;
  }
  .sidebar-link:last-child { border-bottom: none; }
  .sidebar-link:hover { background: var(--light-blue); color: var(--accent); }
  .sidebar-link.active { color: var(--accent); font-weight: 700; background: #eef5fd; }
  .sidebar-link .count {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .sidebar-link.active .count { background: var(--accent); color: #fff; }
  .tag-cloud { padding: 16px 16px; display: flex; flex-wrap: wrap; gap: 7px; }
  .tag-chip {
    font-size: 0.84rem;
    color: var(--accent);
    background: var(--light-blue);
    border-radius: 20px;
    padding: 3px 10px;
    text-decoration: none;
    transition: all 0.15s;
    font-weight: 500;
  }
  .tag-chip:hover { background: var(--accent); color: #fff; }

  /* ── MAIN ── */
  .main { min-width: 0; }
  .page-title-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 36px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title-bar h2 {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
  }
  .count-badge {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.88rem;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .list-meta {
    font-size: 0.82rem;
    color: var(--muted);
    padding: 6px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid var(--border);
  }
  .list-meta-label {
    background: var(--accent);
    color: #fff;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 4px;
  }

  /* ── ARTICLE CARD ── */
  .article-list { display: flex; flex-direction: column; }
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 34px 40px 30px;
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 0 24px;
    transition: background 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.4s ease both;
  }
  .article-card:first-child { border-top: 1px solid var(--border); border-radius: 12px 12px 0 0; }
  .article-card:last-child { border-radius: 0 0 12px 12px; }
  .article-card:hover { background: #fafcff; box-shadow: inset 3px 0 0 var(--accent); }

  
  .article-card:nth-child(1) { animation-delay: 0.05s; }
  
  .article-card:nth-child(2) { animation-delay: 0.1s; }
  
  .article-card:nth-child(3) { animation-delay: 0.15s; }
  
  .article-card:nth-child(4) { animation-delay: 0.2s; }
  
  .article-card:nth-child(5) { animation-delay: 0.25s; }
  
  .article-card:nth-child(6) { animation-delay: 0.3s; }
  
  .article-card:nth-child(7) { animation-delay: 0.35s; }
  

  .card-num { padding-top: 4px; text-align: center; }
  .num-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .num-top1 { background: #fff0ee; border-color: var(--red); color: var(--red); }
  .num-top2 { background: #fff4ec; border-color: var(--orange); color: var(--orange); }
  .num-top3 { background: #edfbf4; border-color: var(--green); color: var(--green); }

  .card-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
  .badge { font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 3px; letter-spacing: 0.04em; }
  .b-top1 { background: var(--red); color: #fff; }
  .b-top2 { background: var(--orange); color: #fff; }
  .b-top3 { background: var(--green); color: #fff; }
  .b-focus { background: var(--blue); color: #fff; }
  .b-cat { background: var(--light-blue); color: var(--blue); font-weight: 600; border: 1px solid #c5dbf5; }

  .card-title {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .card-title a { color: inherit; text-decoration: none; transition: color 0.15s; }
  .article-card:hover .card-title a { color: var(--accent); }

  .card-meta {
    font-size: 0.86rem;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .card-summary { font-size: 0.98rem; color: var(--text2); line-height: 1.9; margin-bottom: 14px; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #f0f4f8;
  }
  .hashtags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hashtag { font-size: 0.84rem; color: var(--accent); text-decoration: none; }
  .hashtag:hover { color: var(--navy); text-decoration: underline; }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--navy);
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.84rem;
    font-weight: 600;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .source-btn:hover { background: var(--accent); }

  /* ── FOOTER ── */
  .footer {
    background: var(--navy);
    color: #6a8aaa;
    text-align: center;
    padding: 28px 20px;
    font-size: 0.82rem;
    margin-top: 40px;
    line-height: 2;
  }
  .footer strong { color: #a0bcd8; }

  /* ── DATE NAV ── */
  .date-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    box-shadow: 0 2px 6px rgba(10,22,40,0.04);
  }
  .date-nav-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .date-nav-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-right: 6px;
    white-space: nowrap;
  }
  .date-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-width: 68px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    line-height: 1.3;
  }
  .date-btn:hover:not(.disabled):not(.active) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--light-blue);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(43,127,232,0.15);
  }
  .date-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(43,127,232,0.3);
    transform: translateY(-1px);
  }
  .date-btn.disabled {
    opacity: 0.38;
    cursor: not-allowed;
    background: #f6f8fb;
    border-color: #e4e9f0;
    color: var(--muted);
  }
  .date-btn-weekday {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .date-btn-md {
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; padding: 20px 16px 60px; }
    .sidebar { display: none; }
    .header-inner { padding: 14px 20px; }
    .header-date { display: none; }
    .article-card { padding: 18px 18px 16px; grid-template-columns: 32px 1fr; gap: 0 12px; }
    .card-title { font-size: 1.05rem; }
    .page-title-bar { padding: 16px 20px; }
    .date-nav-inner { padding: 0 16px; gap: 7px; }
    .date-btn { min-width: 56px; padding: 7px 8px; }
    .date-btn-weekday { font-size: 0.7rem; }
    .date-btn-md { font-size: 0.82rem; }
    .date-nav-label { display: none; }
  }
</style>
</head>

const ALL_DAYS   = {"2026-04-21": {"date_str": "2026年04月21日", "weekday": "星期二", "items": [{"rank": 1, "score": 8.2, "title": "UCHealth虛擬ICU護理師導入AI輔助系統，提升重症遠距照護能力", "summary": "美國UCHealth醫療系統於其虛擬加護病房（Virtual ICU）護理師工作流程中整合人工智慧輔助技術，旨在強化遠距重症監護的即時決策支援能力。虛擬ICU模式透過集中式監控中心，使護理師得以同步監視多個病房的重症病患，而AI系統的加入則進一步提升異常偵測、警示管理與臨床判斷效率。此舉反映出遠距醫療技術與AI整合在加護病房照護模式中的持續演進，亦呼應當前醫療機構面臨護理人力短缺時，藉助科技延伸照護覆蓋範圍的趨勢。虛擬ICU搭配AI的混合模式被視為可同時改善病患安全監測與醫護人員工作負荷的潛在解方，對於資源有限或需要跨院管理重症病患的醫療體系具有重要參考意義。", "tags": ["虛擬ICU", "人工智慧", "重症照護", "遠距醫療"], "author": "Healthcare IT News Feed（2026-04-20）", "source_url": "https://www.healthcareitnews.com/video/virtual-icu-nurses-get-ai-boost-uchealth"}, {"rank": 2, "score": 7.8, "title": "AACR 2026：CAR-T細胞療法早期試驗顯示可預防高風險冒煙型多發性骨髓瘤進展", "summary": "2026年美國癌症研究協會（AACR）年會上，一項早期臨床試驗結果顯示，CAR-T細胞療法（以Carvykti為代表）在高風險冒煙型多發性骨髓瘤（Smoldering Multiple Myeloma）患者中展現出防止疾病進展為活動性骨髓瘤的潛力。此研究引發學界廣泛關注，因為傳統上冒煙型骨髓瘤多採觀察等待策略，而將CAR-T療法提前應用於症狀前期患者屬具爭議性的創新嘗試。試驗初步結果帶來希望，但同時也引發關於治療時機、長期安全性及成本效益的深層討論。此發展對血液腫瘤科臨床實踐及未來治療指引的制定具有重要意涵，亦與Eli Lilly以32.5億美元收購Kelonia Therapeutics以強化基因細胞治療管線的戰略布局相互呼應。", "tags": ["CAR-T療法", "多發性骨髓瘤", "細胞治療", "臨床試驗"], "author": "STAT（2026-04-20）", "source_url": "https://www.statnews.com/2026/04/20/aacr-2026-car-t-trial-results-carvykti-smoldering-multiple-myeloma/?utm_campaign=rss"}, {"rank": 3, "score": 7.5, "title": "Eli Lilly以32.5億美元收購Kelonia Therapeutics，加速布局體內基因醫學", "summary": "製藥巨頭Eli Lilly宣布以約32.5億美元收購生物科技新創公司Kelonia Therapeutics，持續強化其體內基因醫學（In Vivo Genetic Medicines）研發管線。Kelonia專注於體內細胞療法技術，其研究聚焦於多發性骨髓瘤及B細胞成熟抗原（BCMA）靶向治療領域。此次收購是Eli Lilly近期一系列基因醫學戰略收購的延續，反映大型製藥公司積極搶進次世代細胞與基因治療平台的趨勢。值得注意的是，Kelonia在被收購前曾歷經財務困境，此交易不僅為投資方提供退場機制，更賦予其技術平台得以在充足資源下持續發展的機會，對整體癌症治療格局及精準醫學發展方向具有重要指標意義。", "tags": ["基因療法", "細胞治療", "企業併購", "腫瘤學"], "author": "STAT（2026-04-20）", "source_url": "https://www.statnews.com/2026/04/20/kelonia-therapeutics-eli-lilly-slide-deck-memo/?utm_campaign=rss"}, {"rank": 4, "score": 7.0, "title": "遠距住院醫師制度（Tele-Hospitalist）的多元應用潛力超乎多數人預期", "summary": "Healthcare IT News 一篇深度分析報導指出，遠距住院醫師（Tele-Hospitalist）制度所能解決的醫院營運挑戰遠比多數人認知的廣泛。在正常運作情境下，住院醫師需維持病房人流平衡、管理急診入院速率並進行全面評估與照護協調；然而在尖峰時段、人力短缺或突發事件時，傳統模式即面臨嚴峻壓力。遠距住院醫師透過遠端連線提供即時臨床支援，可協助應對病患暴增、夜間覆蓋、偏遠院區支援及跨院轉診評估等多種情境。報導強調此模式在提升醫療可近性、降低醫師過勞風險及維持照護品質方面具有系統性價值，對於人力資源分配面臨挑戰的醫療網絡或多院區體系尤具參考意義。", "tags": ["遠距醫療", "住院醫師", "醫院管理", "醫療人力"], "author": "Healthcare IT News Feed（2026-04-20）", "source_url": "https://www.healthcareitnews.com/news/tele-hospitalists-can-help-more-challenges-most-realize"}, {"rank": 5, "score": 6.5, "title": "美國WISeR模式試行結果引發爭議：六州醫療照護延誤與拒絕率攀升", "summary": "美國眾議員Suzan DelBene（民主黨，華盛頓州）公開指出，在美國醫療保險與補助服務中心（CMS）強制推行「浪費與不當服務縮減模式」（WISeR Model）的六個試行州中，傳統Medicare的照護拒絕案例正對病患照護造成實質傷害。該議員表示，自CMS領導層推行此一利用AI與演算法審核醫療必要性的模式以來，照護延誤與拒絕率顯著上升，引發醫療提供者與患者的強烈反彈。此事件凸顯AI輔助前置授權（Prior Authorization）審查機制在實際政策落地時可能面臨的倫理與臨床爭議，亦再次引發各界對演算法決策透明度、申訴機制健全性及病患權益保障的廣泛討論，對全球正積極評估AI審核系統的醫療體系具有重要警示意涵。", "tags": ["前置授權", "醫療政策", "人工智慧審核", "Medicare"], "author": "Healthcare IT News Feed（2026-04-20）", "source_url": "https://www.healthcareitnews.com/news/care-delays-and-denials-grow-across-6-states-using-wiser-model-lawmaker-says"}, {"rank": 6, "score": 6.0, "title": "UnitedHealthcare擴大偏鄉醫療計畫並縮減前置授權要求", "summary": "美國最大健康保險公司UnitedHealthcare宣布擴大偏遠地區醫療照護相關計畫，同時針對特定醫療服務項目減少前置授權（Prior Authorization）要求。此舉被視為回應近期社會各界對保險公司過度限制醫療使用之批評的政策調整，亦反映美國農村醫療可近性長期不足的結構性問題。前置授權流程的簡化有助於縮短病患等待時間、減少行政負擔，並改善偏遠地區民眾的就醫體驗。然而，業界觀察人士亦關注此類政策調整的實際執行範疇與成效追蹤機制。此一發展對於正在檢討前置授權政策合理性的各國健康保險主管機關及醫療支付方具有一定參考價值。", "tags": ["前置授權", "偏鄉醫療", "健康保險", "醫療可近性"], "author": "MedCity News（2026-04-21）", "source_url": "https://medcitynews.com/2026/04/unitedhealthcare-rural-health-prior-authorization/"}, {"rank": 7, "score": 5.5, "title": "KRAS基因突變終成可標靶藥物：2026年突破獎得主研究進展引關注", "summary": "STAT News報導指出，長期被視為「不可成藥」靶點的KRAS基因突變，隨著2026年突破獎（Breakthrough Prize）得主相關研究的發表，其作為藥物標靶的可行性持續獲得突破性進展。KRAS突變廣泛存在於胰臟癌、大腸直腸癌及肺癌等高致死率惡性腫瘤中，過去因其生化特性難以被小分子抑制劑結合，導致直接靶向治療長達數十年未能實現。近年Sotorasib等第一代KRAS G12C抑制劑的核准上市已開啟新頁，而本次報導所涉及的研究進展顯示更廣泛KRAS突變亞型的靶向策略正逐步成熟，對胰臟癌等預後極差之癌症的未來治療選擇具有深遠意涵。", "tags": ["KRAS靶向治療", "癌症新藥", "精準醫學", "腫瘤學"], "author": "STAT（2026-04-20）", "source_url": "https://www.statnews.com/2026/04/20/biotech-news-finally-cracking-kras-as-a-druggable-target/?utm_campaign=rss"}]}, "2026-04-20": {"date_str": "2026年04月20日", "weekday": "星期一", "items": [{"rank": 1, "score": 9.0, "title": "生成式AI聊天機器人在鑑別診斷上持續表現不佳——Mass General Brigham研究", "summary": "麻省總醫院暨布萊根婦女醫院（Mass General Brigham）研究團隊於2025年1月至12月間，針對21種不同的生成式大型語言模型（LLM）進行系統性評估，以29份標準化臨床病例情境（clinical vignettes）作為測試基準。研究結果顯示，生成式AI聊天機器人在鑑別診斷（differential diagnosis）任務上持續面臨重大挑戰，整體表現仍未達臨床應用標準。此研究橫跨整整一年，涵蓋市面上主流LLM模型，具有相當的廣度與代表性，其發現為當前AI輔助臨床決策的能力邊界提供重要的實證依據。鑑別診斷是臨床醫療的核心環節，此研究結果對評估AI工具在診斷支援上的實際效用具有重要參考意義，提醒醫療機構在引入生成式AI診斷輔助工具時應審慎評估其準確性與可靠性。", "tags": ["生成式AI", "鑑別診斷", "大型語言模型", "臨床決策支援"], "author": "Fierce Healthcare（2026年04月20日）", "source_url": "https://www.fiercehealthcare.com/ai-and-machine-learning/gen-ai-chatbots-continually-struggle-differential-diagnoses-mass-general"}, {"rank": 2, "score": 8.2, "title": "醫療AI信任與採用：醫學界面臨的關鍵挑戰", "summary": "本文探討醫療領域中人工智慧採用的核心議題——信任建立。文章分析臨床人員與患者對AI工具的信任障礙，包括演算法透明度不足、模型可解釋性（explainability）欠缺、資料偏差（data bias）疑慮，以及臨床責任歸屬不明確等問題。文中指出，AI工具在醫療場域的落地不僅取決於技術效能，更高度依賴醫療機構能否建立有效的信任機制，包括嚴謹的臨床驗證流程、透明的績效指標揭露，以及完善的人機協作框架。隨著AI診斷輔助、影像判讀、臨床決策支援等應用快速擴展，如何系統性地建立醫療AI信任生態，已成為全球醫療機構推動AI轉型的關鍵前提條件。", "tags": ["醫療AI信任", "AI採用", "臨床決策支援", "AI治理"], "author": "MedCity News（2026年04月20日）", "source_url": "https://medcitynews.com/2026/04/trust-and-ai-adoption-in-medicine/"}, {"rank": 3, "score": 7.8, "title": "UMC El Paso運用數位儀表板將急診滯留時間縮減一半", "summary": "德州艾爾帕索大學醫學中心（UMC El Paso）是方圓270英里內唯一的第一級創傷中心，同時也是該地區唯一經聯合委員會（Joint Commission）認證的綜合性腦中風中心。面對龐大區域醫療服務需求所帶來的急診壅塞壓力，該院導入數位化即時監控儀表板（real-time dashboards）系統，整合急診流量、病床狀態、滯留病人資訊等關鍵數據，讓管理人員與臨床團隊能即時掌握並主動介入流程瓶頸。實施後，急診滯留（ED boarding）時間成功縮減約50%，有效改善患者安全與照護品質。此案例展示資料視覺化工具在高壓、高容量醫療環境中的實際應用成效，對急診容量管理具有重要的參考價值。", "tags": ["急診管理", "數位儀表板", "病床管理", "醫療流程改善"], "author": "Healthcare IT News（2026年04月20日）", "source_url": "https://www.healthcareitnews.com/news/umc-el-paso-cuts-ed-boarding-half-dashboards"}, {"rank": 4, "score": 7.5, "title": "KRAS抑制劑daraxonrasib在AACR 2026展現突破性胰臟癌治療數據", "summary": "在2026年美國癌症研究協會（AACR）年會上，Revolution Medicines發表其KRAS抑制劑daraxonrasib的最新臨床數據，顯示對胰臟癌患者具有前所未有的療效，部分患者存活時間較現行標準治療提升近一倍。胰臟癌長期被視為預後極差的惡性腫瘤，KRAS基因突變存在於超過90%的胰臟癌病例中，過去因KRAS蛋白質結構特性（俗稱「油膩的球」）而被認為難以作為藥物標靶。daraxonrasib的臨床突破意味著KRAS靶向治療在胰臟癌領域取得重大里程碑，被業界視為近數十年來最具潛力的胰臟癌新藥之一。此研究結果為未來胰臟癌精準治療策略的發展奠定重要基礎。", "tags": ["KRAS抑制劑", "胰臟癌", "標靶治療", "腫瘤學"], "author": "STAT News（2026年04月19日）", "source_url": "https://www.statnews.com/2026/04/19/daraxonrasib-pancreatic-cancer-kras-revolution-medicines-patient-story/?utm_campaign=rss"}, {"rank": 5, "score": 6.8, "title": "團隊照護與虛擬護理模式正在重塑醫療服務提供方式", "summary": "隨著護理人力短缺問題持續加劇，美國各大醫療機構積極探索以團隊照護（team-based care）與虛擬護理（virtual nursing）為核心的新型醫療服務模式。虛擬護理透過遠距視訊技術，讓經驗豐富的護理師能夠跨病房、跨院區同時支援多個臨床單位，協助執行入院評估、衛教、出院規劃及藥物核對等工作，以減輕第一線護理師的行政與認知負擔。團隊照護模式則強調各職類醫療人員依據其專業能力分工協作，提升整體照護效率。文章指出，這兩種模式結合數位工具的運用，已在多個試行機構展現改善護病比、降低護理人員耗竭、提升病人滿意度等正向效益，代表護理照護模式的結構性轉型趨勢。", "tags": ["虛擬護理", "團隊照護", "護理人力", "照護模式創新"], "author": "MedCity News（2026年04月20日）", "source_url": "https://medcitynews.com/2026/04/how-team-based-and-virtual-nursing-models-are-redefining-care-delivery/"}, {"rank": 6, "score": 6.2, "title": "社會處方籤新模式：紐約FQHC為慢性病患開立藝術文化活動處方", "summary": "SocialRx與紐約市一家聯邦合格健康中心（Federally Qualified Health Center, FQHC）合作，推動「社會處方籤」（social prescribing）計畫，針對慢性病患者開立藝術與文化活動參與處方，以非臨床、社區導向的方式支持患者心理健康並減少社會孤立感。在此模式中，醫療提供者可正式將患者轉介至博物館、藝術工作坊、社區文化活動等場域，作為藥物治療之外的輔助介入措施。此計畫呼應全球公共衛生領域對社會決定因子（social determinants of health）的重視，並代表美國醫療體系將非醫療資源系統性整合至慢性病管理路徑的新興嘗試。英國已有較成熟的社會處方籤體系，此紐約案例為北美地區推廣此模式提供實踐參考。", "tags": ["社會處方籤", "慢性病管理", "社會健康決定因子", "整合性照護"], "author": "Fierce Healthcare（2026年04月20日）", "source_url": "https://www.fiercehealthcare.com/providers/socialrx-teams-nyc-federally-qualified-health-center-social-prescribing"}, {"rank": 7, "score": 5.8, "title": "逾八成基層醫療醫師憂慮未來數年財務穩定性", "summary": "Elation Health委託進行的最新調查顯示，超過80%的基層醫療（Primary Care Physicians, PCPs）醫師對未來數年的診所財務穩定性表示擔憂，主要壓力來源包括保險給付縮減、行政成本上升、醫療債務壓力及人力成本攀升等。儘管財務前景不確定，仍有高達93%的受訪醫師表示將持續留在基層醫療領域執業，顯示對基層醫療使命的高度認同感。調查同時指出，財務壓力正驅使更多基層醫療診所尋求整合、加入醫療集團或轉型採行直接初級照護（Direct Primary Care, DPC）等替代支付模式。此調查結果反映全球基層醫療體系在財務可持續性方面所面臨的結構性挑戰，對醫療政策制定具有重要參考意義。", "tags": ["基層醫療", "醫療財務", "醫師人力", "醫療政策"], "author": "Fierce Healthcare（2026年04月20日）", "source_url": "https://www.fiercehealthcare.com/providers/over-80-pcps-concerned-about-financial-stability-over-next-several-years-elation-health"}]}, "2026-04-19": {"date_str": "2026年04月19日", "weekday": "星期日", "items": [{"rank": 1, "score": 9.0, "title": "生成式AI聊天機器人在鑑別診斷上持續表現欠佳——Mass General Brigham研究", "summary": "麻省總醫院Brigham研究團隊針對21種生成式AI大型語言模型（LLMs），以29個標準化臨床病例小品（clinical vignettes）進行系統性評估，研究期間橫跨2025年1月至12月。結果顯示，即便經過一年內多次模型更新，生成式AI聊天機器人在鑑別診斷任務上仍持續面臨挑戰，準確性與一致性均未達臨床可靠門檻。此研究為目前規模較大、時間跨度較長的AI臨床診斷能力評估之一，其發現對於正在評估或部署AI輔助診斷工具的醫療機構具有重要參考意義，也凸顯出AI工具在進入臨床決策流程前須經嚴格驗證的必要性。", "tags": ["生成式AI", "鑑別診斷", "臨床決策支援", "大型語言模型"], "author": "Fierce Healthcare（2026-04-19）", "source_url": "https://www.fiercehealthcare.com/ai-and-machine-learning/gen-ai-chatbots-continually-struggle-differential-diagnoses-mass-general"}, {"rank": 2, "score": 8.2, "title": "UMC El Paso導入即時儀表板，急診滯留時間減少一半", "summary": "德州大學醫學中心El Paso分院（UMC El Paso）為當地方圓270英里內唯一的第一級創傷中心及綜合性卒中認證中心。該院面對急診壅塞與患者滯留（boarding）的長期挑戰，透過導入即時數據儀表板（dashboards）系統，將急診滯留人數減少約50%。儀表板整合床位管理、病患流量及出院資訊，使臨床及行政人員能即時掌握床位狀態並加速決策。此案例展示了數位化營運工具在改善急診流程與降低壅塞方面的實際效益，對資源有限且肩負區域性重責的醫學中心尤具參考價值。", "tags": ["急診管理", "床位管理", "即時儀表板", "醫院營運"], "author": "Healthcare IT News（2026-04-19）", "source_url": "https://www.healthcareitnews.com/news/umc-el-paso-cuts-ed-boarding-half-dashboards"}, {"rank": 3, "score": 7.5, "title": "胰臟癌治療新突破：Revolution Medicines研究或開啟全新治療時代", "summary": "Revolution Medicines針對胰臟癌研發的新型藥物daraxonrasib完成臨床試驗數據發布，紐約大學Langone Perlmutter癌症中心胰臟癌專家Paul Oberstein公開表示，此結果「可能開啟胰臟癌治療的新時代」。daraxonrasib屬於RAS抑制劑類別，胰臟癌因KRAS突變盛行率極高，長期以來缺乏有效靶向治療，該藥物的臨床數據突破引發腫瘤學界高度關注。胰臟癌五年存活率長期偏低，新型靶向治療的問世若能獲監管機構核准，將對全球胰臟癌患者的治療選項產生深遠影響。", "tags": ["胰臟癌", "靶向治療", "RAS抑制劑", "腫瘤學"], "author": "STAT News（2026-04-17）", "source_url": "https://www.statnews.com/2026/04/17/revolution-medicines-daraxonrasib-clinical-trial-readout-loud-podcast-transcript/?utm_campaign=rss"}, {"rank": 4, "score": 7.0, "title": "行為健康需求自2018年以來成長62%，醫療產業面臨結構性壓力", "summary": "據Trilliant Health最新分析數據，美國行為健康（behavioral health）服務需求自2018年至今已累計成長62%，但供給端的擴充速度遠遠跟不上需求增長。需求激增主要源於新冠疫情後的心理健康危機、青少年心理問題惡化及物質濫用問題加劇等多重因素。此現象導致候診等待時間延長、未滿足醫療需求擴大，並加重現有心理健康服務提供者的工作負荷。報告指出，數位心理健康平台、整合式照護模式及科技輔助干預工具的發展，被視為緩解此一結構性缺口的重要方向。", "tags": ["行為健康", "心理健康", "醫療需求", "數位健康"], "author": "MedCity News（2026-04-19）", "source_url": "https://medcitynews.com/2026/04/behavioral-health-demand-trilliant/"}, {"rank": 5, "score": 6.8, "title": "Trump簽署行政命令加速迷幻藥療法研究與監管改革", "summary": "美國總統川普簽署行政命令，指示聯邦政府加速批准迷幻藥（psychedelics）相關治療方案的使用途徑，並要求重新評估裸蓋菇素（psilocybin）、MDMA等物質作為列管藥品的法律地位。此舉主要針對PTSD（創傷後壓力症候群）及其他難治性心理疾患的治療需求，特別關注退伍軍人族群。行政命令將促使FDA及DEA重新審視現行管制架構，並可能加速相關臨床試驗的推進。此政策走向在精神科與成癮醫學界引發廣泛討論，亦對全球迷幻藥療法的監管趨勢具有指標意義。", "tags": ["迷幻藥療法", "PTSD", "精神健康政策", "藥物監管"], "author": "STAT News（2026-04-18）", "source_url": "https://www.statnews.com/2026/04/18/psychedelics-ptsd-mental-health-research-boost-from-trump-executive-order/?utm_campaign=rss"}, {"rank": 6, "score": 6.2, "title": "逾八成基層醫療醫師憂慮未來數年財務穩定性", "summary": "Elation Health針對基層醫療醫師（primary care physicians, PCPs）進行的調查顯示，超過80%的受訪者對未來數年的執業財務穩定性感到憂慮，主要壓力來源包括保險給付偏低、行政成本攀升及通膨壓力等。然而，儘管財務困境普遍，仍有高達93%的醫師表示將持續投身基層醫療。調查結果凸顯基層醫療在財務永續性方面面臨嚴峻挑戰，此問題若未能有效解決，恐影響基層醫療人力的長期供給，進而衝擊整體醫療體系的可近性與連續性照護。", "tags": ["基層醫療", "醫師執業環境", "醫療財務", "人力資源"], "author": "Fierce Healthcare（2026-04-19）", "source_url": "https://www.fiercehealthcare.com/providers/over-80-pcps-concerned-about-financial-stability-over-next-several-years-elation-health"}, {"rank": 7, "score": 5.8, "title": "Kailera擴大IPO募資6.25億美元，推進多款注射與口服肥胖症新藥", "summary": "生技公司Kailera完成規模擴大後的首次公開募股（IPO），成功募集6.25億美元，資金將用於推進其GLP-1/GIP受體雙重促效劑ribupatide及多款口服肥胖症藥物的臨床開發管線。此輪募資金額超越原定目標，顯示資本市場對肥胖症藥物賽道的高度關注。Kailera的藥物候選品除注射劑型外，亦積極開發口服劑型，以提升患者用藥便利性及市場潛力。GLP-1相關藥物市場競爭日趨激烈，Kaile // ── 產生單張文章卡片 HTML ────────────────────────────────────────
function renderCard(item, rank) {
  const badges = {
    1: ['b-top1','🥇 Top 1'],
    2: ['b-top2','🥈 Top 2'],
    3: ['b-top3','🥉 Top 3'],
  };
  const numClasses = { 1:'num-top1', 2:'num-top2', 3:'num-top3' };
  const [badgeCls, badgeTxt] = badges[rank] || ['b-focus','焦點'];
  const numCls  = numClasses[rank] || '';
  const tags    = item.tags || [];
  const catBadges = tags.slice(0,2).map(t=>`<span class="badge b-cat">${esc(t)}</span>`).join('');
  const titleHtml = item.source_url
    ? `<a href="${esc(item.source_url)}" target="_blank">${esc(item.title)}</a>`
    : esc(item.title);
  const hashtags = tags.map((t,i)=>
    `<a class="hashtag" href="#" onclick="filterByTag(this,'${esc(t)}');return false;">#${esc(t)}${i<tags.length-1?'、':''}</a>`
  ).join('');
  const srcBtn = item.source_url
    ? `<a class="source-btn" href="${esc(item.source_url)}" target="_blank">🔗 原始來源</a>` : '';

  return `
  <article class="article-card" data-tags="${tags.map(esc).join('|')}" style="animation-delay:${(rank*0.05).toFixed(2)}s">
    <div class="card-num"><div class="num-circle ${numCls}">${rank}</div></div>
    <div class="card-body">
      <div class="card-badges"><span class="badge ${badgeCls}">${badgeTxt}</span>${catBadges}</div>
      <div class="card-title">${titleHtml}</div>
      <div class="card-meta"><span>📅 ${esc(item.author||'')}</span></div>
      <div class="card-summary">${esc(item.summary||'')}</div>
      <div class="card-footer">
        <div class="hashtags">${hashtags}</div>${srcBtn}
      </div>
    </div>
  </article>`;
}

  const day = ALL_DAYS[dateIso];
  if (!day) return;
  const items = day.items || [];

  // 標題列
  document.getElementById('page-title').textContent =
    `醫療AI每日情報｜${day.date_str}（${day.weekday}）`;
  document.getElementById('count-badge').textContent =
    `今日精選 ${items.length} 則`;
  document.getElementById('list-count').textContent =
    `共 ${items.length} 筆`;

  // Header 日期
  const hd = document.querySelector('.header-date');
  if (hd) hd.textContent = `📅 ${day.date_str}（${day.weekday}）`;

  // 文章列表
  document.getElementById('article-list').innerHTML =
    items.map((item, i) => renderCard(item, i+1)).join('');

  // 收集所有標籤
  const allTags = [];
  items.forEach(item => (item.tags||[]).forEach(t => {
    if (!allTags.includes(t)) allTags.push(t);
  }));

  // 側欄分類
  document.getElementById('sidebar-links').innerHTML =
    `<a class="sidebar-link active" href="#" onclick="filterByTag(this,'all');return false;">
       今日精選 <span class="count">${items.length}</span>
     </a>` +
    allTags.map(t =>
      `<a class="sidebar-link" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 標籤雲
  document.getElementById('tag-cloud').innerHTML =
    allTags.map(t =>
      `<a class="tag-chip" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 日期按鈕 active 狀態
  document.querySelectorAll('.date-btn[data-date-iso]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dateIso === dateIso);
    // 今天的按鈕文字
    const weekdayEl = btn.querySelector('.date-btn-weekday');
    if (weekdayEl) {
      if (btn.dataset.dateIso === TODAY_ISO) weekdayEl.textContent = '今天';
      // else 保持原來的星期文字（Jinja2 渲染時已設定）
    }
  });

  // Footer
  const footer = document.querySelector('.footer');
  if (footer) footer.innerHTML =
    `<strong>🧠 奇美醫療AI每日情報</strong>｜奇美醫療體系 · AI Everywhere 計畫<br>
     本簡報由奇美 AI Everywhere 情報代理人自動生成 · ${day.date_str}`;
}

// ── 標籤篩選 ──────────────────────────────────────────────────
function filterByTag(el, tag) {
  const cards = document.querySelectorAll('.article-card');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

  let visible = 0;
  cards.forEach(card => {
    const match = tag === 'all' ||
      (card.getAttribute('data-tags')||'').split('|').includes(tag);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  document.getElementById('list-count').textContent  = `共 ${visible} 筆`;
  document.getElementById('count-badge').textContent = `今日精選 ${visible} 則`;

  const vis = [...cards].filter(c => c.style.display !== 'none');
  cards.forEach(c => { c.style.borderRadius=''; c.style.borderTop=''; });
  if (vis.length) {
    vis[0].style.cssText += ';border-radius:12px 12px 0 0;border-top:1px solid var(--border)';
    if (vis.length===1) vis[0].style.borderRadius='12px';
    else vis[vis.length-1].style.cssText += ';border-radius:0 0 12px 12px';
  }
}

// ── HTML 跳脫工具 ─────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 頁面初始化 ────────────────────────────────────────────────
switchDay(TODAY_ISO);
</script>
