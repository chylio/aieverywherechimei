<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇美 AI Everywhere Brief｜2026年04月16日</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0a1628;
    --blue:    #1a4a8a;
    --accent:  #2b7fe8;
    --light-blue: #e8f2fd;
    --teal:    #0e9f8e;
    --red:     #d63c2f;
    --orange:  #e07520;
    --green:   #1e9e5a;
    --bg:      #f2f5f9;
    --surface: #ffffff;
    --border:  #dce4ef;
    --text:    #1a2333;
    --text2:   #445066;
    --muted:   #7a8899;
    --serif:   'Noto Serif TC', serif;
    --sans:    'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 17px;
    line-height: 1.8;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    background-image: linear-gradient(135deg, #0a1628 0%, #162d58 60%, #1a4a8a 100%);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 22px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .logo-text p { font-size: 0.8rem; color: #8aafd4; margin-top: 1px; }
  .header-date {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.88rem;
    color: #a8c8ea;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
  }
  .breadcrumb-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb .sep { color: #c0c8d4; }
  .breadcrumb .current { color: var(--accent); font-weight: 600; }

  /* ── LAYOUT ── */
  .layout {
    max-width: 1360px;
    margin: 0 auto;
    padding: 40px 32px 100px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 82px; }
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.06);
  }
  .sidebar-head {
    background: var(--navy);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 12px 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    font-size: 0.92rem;
    color: var(--text2);
    text-decoration: none;
    border-bottom: 1px solid #f0f4f8;
    transition: all 0.15s;
  }
  .sidebar-link:last-child { border-bottom: none; }
  .sidebar-link:hover { background: var(--light-blue); color: var(--accent); }
  .sidebar-link.active { color: var(--accent); font-weight: 700; background: #eef5fd; }
  .sidebar-link .count {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .sidebar-link.active .count { background: var(--accent); color: #fff; }
  .tag-cloud { padding: 16px 16px; display: flex; flex-wrap: wrap; gap: 7px; }
  .tag-chip {
    font-size: 0.84rem;
    color: var(--accent);
    background: var(--light-blue);
    border-radius: 20px;
    padding: 3px 10px;
    text-decoration: none;
    transition: all 0.15s;
    font-weight: 500;
  }
  .tag-chip:hover { background: var(--accent); color: #fff; }

  /* ── MAIN ── */
  .main { min-width: 0; }
  .page-title-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 36px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(10,22,40,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title-bar h2 {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
  }
  .count-badge {
    background: var(--light-blue);
    color: var(--accent);
    font-size: 0.88rem;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .list-meta {
    font-size: 0.82rem;
    color: var(--muted);
    padding: 6px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid var(--border);
  }
  .list-meta-label {
    background: var(--accent);
    color: #fff;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 4px;
  }

  /* ── ARTICLE GRID (NEW TEMPLATE) ── */
  .article-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    padding-top: 18px;
  }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(10,22,40,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    animation: fadeUp 0.35s ease both;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .article-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 26px rgba(10,22,40,0.12);
    border-color: #cfe0f7;
  }

  .card-top {
    padding: 14px 16px 10px;
  }

  .tagline {
    font-size: 0.86rem;
    font-weight: 700;
    line-height: 1.35;
    color: #ff6a00;
    word-break: break-word;
  }

  .tagline a {
    color: inherit;
    text-decoration: none;
  }

  .tagline a:hover {
    text-decoration: underline;
  }

  .card-img {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #e6effa, #f7fbff);
    border-top: 1px solid #f0f4f8;
    border-bottom: 1px solid #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 1.22rem;
    font-weight: 800;
    color: #111827;
    line-height: 1.35;
    letter-spacing: 0.01em;
    margin: 0;
  }

  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .card-summary {
    font-size: 0.95rem;
    color: var(--text2);
    line-height: 1.75;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    margin-top: auto;
    font-size: 0.82rem;
    color: #9aa6b2;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid #f0f4f8;
  }

  .meta-date { white-space: nowrap; }

  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #111827;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.82rem;
    font-weight: 700;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .source-btn:hover { background: var(--accent); }

  /* (keep existing) hashtag styles for sidebar/tag cloud behavior */
  .hashtags { display: none; }

  /* ── FOOTER ── */
  .footer {
    background: var(--navy);
    color: #6a8aaa;
    text-align: center;
    padding: 28px 20px;
    font-size: 0.82rem;
    margin-top: 40px;
    line-height: 2;
  }
  .footer strong { color: #a0bcd8; }

  /* ── DATE NAV ── */
  .date-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    box-shadow: 0 2px 6px rgba(10,22,40,0.04);
  }
  .date-nav-inner {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .date-nav-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-right: 6px;
    white-space: nowrap;
  }
  .date-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-width: 68px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    line-height: 1.3;
  }
  .date-btn:hover:not(.disabled):not(.active) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--light-blue);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(43,127,232,0.15);
  }
  .date-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(43,127,232,0.3);
    transform: translateY(-1px);
  }
  .date-btn.disabled {
    opacity: 0.38;
    cursor: not-allowed;
    background: #f6f8fb;
    border-color: #e4e9f0;
    color: var(--muted);
  }
  .date-btn-weekday {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .date-btn-md {
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 1100px) {
    .article-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; padding: 20px 16px 60px; }
    .sidebar { display: none; }
    .header-inner { padding: 14px 20px; }
    .header-date { display: none; }
    .page-title-bar { padding: 16px 20px; }
    .date-nav-inner { padding: 0 16px; gap: 7px; }
    .date-btn { min-width: 56px; padding: 7px 8px; }
    .date-btn-weekday { font-size: 0.7rem; }
    .date-btn-md { font-size: 0.82rem; }
    .date-nav-label { display: none; }

    .article-list { grid-template-columns: 1fr; }
    .card-title { font-size: 1.06rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">🧠</div>
      <div class="logo-text">
        <h1>奇美 AI Everywhere Brief</h1>
        <p>奇美醫療體系 · 醫療 AI 每日情報簡報</p>

    </div>
    <div class="header-date">📅 2026年04月16日（星期四）</div>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="#">首頁</a>
    <span class="sep">›</span>
    <a href="#">醫療AI情報</a>
    <span class="sep">›</span>

<!-- DATE NAV -->
<div class="date-nav">
  <div class="date-nav-inner">
    <span class="date-nav-label">📅 近7日</span>
    
      
        <button class="date-btn disabled" disabled>
          <span class="date-btn-weekday">星期五</span>
          <span class="date-btn-md">04/10</span>
        </button>
      
    
      
        <button class="date-btn disabled" disabled>
          <span class="date-btn-weekday">星期六</span>

        </button>
      
    
      
        <button class="date-btn disabled" disabled>
          <span class="date-btn-weekday">星期日</span>

        </button>
      
    
      
        <button class="date-btn disabled" disabled>
          <span class="date-btn-weekday">星期一</span>

        </button>
      
    
      
        <button class="date-btn disabled" disabled>
          <span class="date-btn-weekday">星期二</span>
          <span class="date-btn-md">04/14</span>
        </button>
      
    
      
        <button class="date-btn "
                data-date-iso="2026-04-15"
                onclick="switchDay('2026-04-15')">
          <span class="date-btn-weekday">星期三</span>
          <span class="date-btn-md">04/15</span>
        </button>
      
    
      
        <button class="date-btn active"
                data-date-iso="2026-04-16"
                onclick="switchDay('2026-04-16')">
          <span class="date-btn-weekday">今天</span>
          <span class="date-btn-md">04/16</span>
        </button>
      
    
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-head">📋 情報分類</div>
      <div id="sidebar-links"><!-- JS 填入 --></div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-head">🏷️ 熱門標籤</div>
      <div class="tag-cloud" id="tag-cloud"><!-- JS 填入 --></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-title-bar">
      <h2 id="page-title">醫療AI每日情報｜2026年04月16日（星期四）</h2>
      <span class="count-badge" id="count-badge">今日精選 7 則</span>
    </div>

    <div class="list-meta">
      <span id="list-count">共 7 筆</span>
      <span class="list-meta-label">依相關度排序</span>
    </div>

    <div class="article-list" id="article-list"><!-- JS 填入 --></div>
  </main>

</div>

<footer class="footer">
  <strong>🧠 奇美醫療AI每日情報</strong>｜奇美醫療體系 · AI Everywhere 計畫<br>
  本簡報由奇美 AI Everywhere 情報代理人自動生成 · 2026年04月16日
</footer>


<script>
// ── 所有天的資料（由 Python 嵌入）──────────────────────────────
const ALL_DAYS   = {"2026-04-16": {"date_str": "2026年04月16日", "weekday": "星期四", "items": [{"rank": 1, "score": 9.2, "title": "Abridge AI 臨床平台整合 NEJM 與 JAMA Network 實��[...]}
const TODAY_ISO  = "2026-04-16";

// ── 預設封面圖（無 image_url 時使用）──────────────────────────
const DEFAULT_COVER_SVG = `data:image/svg+xml;utf8,${encodeURIComponent(`
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='675' viewBox='0 0 1200 675'>
  <defs>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='#e8f2fd'/>
      <stop offset='1' stop-color='#ffffff'/>
    </linearGradient>
    <linearGradient id='a' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='#2b7fe8'/>
      <stop offset='1' stop-color='#0e9f8e'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='675' fill='url(#g)'/>
  <circle cx='240' cy='220' r='140' fill='url(#a)' opacity='0.16'/>
  <circle cx='980' cy='520' r='190' fill='url(#a)' opacity='0.14'/>
  <rect x='120' y='140' width='960' height='395' rx='28' fill='#ffffff' opacity='0.75' stroke='#dce4ef'/>
  <text x='600' y='320' font-family='Arial, sans-serif' font-size='54' text-anchor='middle' fill='#0a1628' font-weight='700'>AI Everywhere Brief</text>
  <text x='600' y='385' font-family='Arial, sans-serif' font-size='28' text-anchor='middle' fill='#445066'>Daily AI Intelligence</text>
  <text x='600' y='450' font-family='Arial, sans-serif' font-size='22' text-anchor='middle' fill='#7a8899'>Chimei Medical System</text>
</svg>
`)}`;

function getCoverUrl(item) {
  // 目前無 image_url 欄位 → 一律使用預設
  // 如果未來你加入 item.image_url，這裡可改成：return item.image_url || DEFAULT_COVER_SVG;
  return DEFAULT_COVER_SVG;
}

// ── 顯示用：上方橘色 tags（用 | 分隔）────────────────────────
function renderTagline(tags) {
  const arr = (tags || []).filter(Boolean);
  if (!arr.length) return '';
  return arr.map(t => esc(t)).join(' | ');
}

// ── 產生單張文章卡片 HTML（新模板）────────────────────────────
function renderCard(item, rank) {
  const tags = item.tags || [];
  const titleHtml = item.source_url
    ? `<a href="${esc(item.source_url)}" target="_blank" rel="noopener noreferrer">${esc(item.title||'')}</a>`
    : esc(item.title||'');

  const tagline = renderTagline(tags);
  const coverUrl = getCoverUrl(item);

  // 日期：你目前資料看起來把日期放在 author 欄位（原本 UI 顯示 📅 author）
  // 先保留相容：有 author 就顯示，沒有就留空。
  const dateText = (item.author || '').trim();

  const srcBtn = item.source_url
    ? `<a class="source-btn" href="${esc(item.source_url)}" target="_blank" rel="noopener noreferrer">🔗 原文</a>`
    : '';

  return `
  <article class="article-card" data-tags="${tags.map(esc).join('|')}" style="animation-delay:${(rank*0.05).toFixed(2)}s">
    <div class="card-top">
      <div class="tagline">${tagline}</div>
    </div>

    <div class="card-img">
      <img src="${coverUrl}" alt="cover" loading="lazy" />
    </div>

    <div class="card-body">
      <h3 class="card-title">${titleHtml}</h3>
      <p class="card-summary">${esc(item.summary||'')}</p>

      <div class="card-meta">
        <span class="meta-date">${dateText ? esc(dateText) : ''}</span>
        <span>${srcBtn}</span>
      </div>
    </div>
  </article>`;
}

// ── 切換到指定日期 ─────────────────────────────────────────────
function switchDay(dateIso) {
  const day = ALL_DAYS[dateIso];
  if (!day) return;
  const items = day.items || [];

  // 標題列
  document.getElementById('page-title').textContent =
    `醫療AI每日情報｜${day.date_str}（${day.weekday}）`;
  document.getElementById('count-badge').textContent =
    `今日精選 ${items.length} 則`;
  document.getElementById('list-count').textContent =
    `共 ${items.length} 筆`;

  // Header 日期
  const hd = document.querySelector('.header-date');
  if (hd) hd.textContent = `📅 ${day.date_str}（${day.weekday}）`;

  // 文章列表
  document.getElementById('article-list').innerHTML =
    items.map((item, i) => renderCard(item, i+1)).join('');

  // 收集所有標籤
  const allTags = [];
  items.forEach(item => (item.tags||[]).forEach(t => {
    if (!allTags.includes(t)) allTags.push(t);
  }));

  // 側欄分類
  document.getElementById('sidebar-links').innerHTML =
    `<a class="sidebar-link active" href="#" onclick="filterByTag(this,'all');return false;">
       今日精選 <span class="count">${items.length}</span>
     </a>` +
    allTags.map(t =>
      `<a class="sidebar-link" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 標籤雲
  document.getElementById('tag-cloud').innerHTML =
    allTags.map(t =>
      `<a class="tag-chip" href="#" data-filter="${esc(t)}"
          onclick="filterByTag(this,'${esc(t)}');return false;">${esc(t)}</a>`
    ).join('');

  // 日期按鈕 active 狀態
  document.querySelectorAll('.date-btn[data-date-iso]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dateIso === dateIso);
    // 今天的按鈕文字
    const weekdayEl = btn.querySelector('.date-btn-weekday');
    if (weekdayEl) {
      if (btn.dataset.dateIso === TODAY_ISO) weekdayEl.textContent = '今天';
      // else 保持原來的星期文字（Jinja2 渲染時已設定）
    }
  });

  // Footer
  const footer = document.querySelector('.footer');
  if (footer) footer.innerHTML =
    `<strong>🧠 奇美醫療AI每日情報</strong>｜奇美醫療體系 · AI Everywhere 計畫<br>
     本簡報由奇美 AI Everywhere 情報代理人自動生成 · ${day.date_str}`;
}

// ── 標籤篩選 ──────────────────────────────────────────────────
function filterByTag(el, tag) {
  const cards = document.querySelectorAll('.article-card');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

  let visible = 0;
  cards.forEach(card => {
    const match = tag === 'all' ||
      (card.getAttribute('data-tags')||'').split('|').includes(tag);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  document.getElementById('list-count').textContent  = `共 ${visible} 筆`;
  document.getElementById('count-badge').textContent = `今日精選 ${visible} 則`;
}

// ── HTML 跳脫工具 ─────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 頁面初始化 ────────────────────────────────────────────────
switchDay(TODAY_ISO);
</script>

</body>
